# Block edits to environment and secret files
name: Protect Secrets
description: Prevent AI agents from modifying sensitive configuration files

on:
  file:
    paths:
      - '**/*.env*'
      - '**/secrets/**'
      - '**/*.pem'
      - '**/*.key'
      - '**/credentials*'
      - '**/.aws/**'
    types:
      - edit
      - create

blocking: true

steps:
  - name: Block sensitive file access
    run: |
      echo "❌ Cannot modify sensitive file: ${{ event.file.path }}"
      echo ""
      echo "This file type is protected because it may contain:"
      echo "  - API keys and tokens"
      echo "  - Database credentials"
      echo "  - Private keys"
      echo ""
      echo "To modify this file, please edit it manually."
      exit 1
