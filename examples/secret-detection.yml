# Scan for hardcoded credentials in new files
name: Secret Detection
description: Detect potential hardcoded secrets before they're committed

on:
  file:
    types:
      - create
      - edit
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.py'
      - '**/*.go'
      - '**/*.java'
    paths-ignore:
      - '**/*.test.*'
      - '**/*.spec.*'
      - '**/test/**'

blocking: true

steps:
  - name: Scan for secrets
    run: |
      echo "🔐 Scanning for potential secrets..."
      
      # Common patterns for hardcoded credentials
      patterns='(password|passwd|secret|api_key|apikey|api-key|token|credential|private_key)\s*[:=]\s*["\x27][^"\x27]+'
      
      if grep -iE "$patterns" "${{ event.file.path }}" 2>/dev/null; then
        echo ""
        echo "❌ Potential hardcoded credentials detected!"
        echo ""
        echo "Please use environment variables instead:"
        echo "  const apiKey = process.env.API_KEY"
        exit 1
      fi
      
      echo "✓ No secrets detected"
