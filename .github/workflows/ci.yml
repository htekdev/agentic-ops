name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          cat plugin.json | jq .
          
      - name: Validate hooks.json
        run: |
          cat packages/hooks/hooks.json | jq .
          
      - name: Check scripts are executable
        run: |
          test -f packages/hooks/scripts/pre-tool-use.sh
          test -f packages/hooks/scripts/post-tool-use.sh
          test -f packages/hooks/scripts/install-cli.sh
          
      - name: Validate install script
        run: |
          # Test that install script has correct structure
          head -10 packages/hooks/scripts/install-cli.sh

